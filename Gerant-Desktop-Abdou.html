<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quincaillerie Khadija — Gérant</title>

<!-- PDF LIB -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0a0f1a;color:#fff}
header{background:#111827;padding:15px}
.container{padding:20px}
button{padding:10px 15px;border:none;border-radius:6px;background:#00c896;color:#000;font-weight:bold;cursor:pointer}
input{padding:8px;margin:5px;border-radius:5px;border:1px solid #ccc}
table{width:100%;border-collapse:collapse;margin-top:15px}
th,td{border:1px solid #444;padding:8px}
.card{background:#111827;padding:15px;border-radius:10px;margin-bottom:20px}
</style>
</head>
<body>

<header>
<h1>🔧 Quincaillerie Khadija</h1>
<p>Gérant : Abdou Fall | Adresse : Keur Thiem Cité Dabakh</p>
</header>

<div class="container">

<!-- VENTE -->
<div class="card">
<h2>💰 Nouvelle Vente</h2>
<input id="article" placeholder="Article">
<input id="qte" type="number" placeholder="Quantité">
<input id="prix" type="number" placeholder="Prix">
<input id="client" placeholder="Client">
<button onclick="ajouterVente()">Ajouter Vente</button>
</div>

<!-- DASHBOARD -->
<div class="card">
<h2>📊 Tableau de bord</h2>
<p>Total du jour : <strong id="totalJour">0</strong></p>
<p>Nombre de ventes : <strong id="nbJour">0</strong></p>
<button onclick="exporterVentesJourPDF()">📄 Exporter PDF</button>
</div>

<!-- TABLE -->
<div class="card">
<h2>🧾 Historique des ventes</h2>
<table>
<thead>
<tr><th>Date</th><th>Article</th><th>Qté</th><th>Prix</th><th>Total</th></tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>

// ===== STORAGE =====
function getData(key){return JSON.parse(localStorage.getItem(key)||'[]')}
function saveData(key,data){localStorage.setItem(key,JSON.stringify(data))}

// ===== AJOUT VENTE =====
function ajouterVente(){
  let vente={
    date:new Date().toLocaleDateString(),
    article:article.value,
    qte:+qte.value,
    prix:+prix.value,
    client:client.value,
    total:qte.value*prix.value
  }

  let ventes=getData('ventes')
  ventes.push(vente)
  saveData('ventes',ventes)

  // SYNCHRO FACTURE AUTO
  genererFactureDepuisVente(vente)

  afficher()
  updateDashboard()
}

// ===== FACTURE =====
function genererFactureDepuisVente(v){
  let factures=getData('factures')

  let facture={
    id:'FAC-'+Date.now(),
    date:v.date,
    client:v.client || 'Client',
    articles:[{
      nom:v.article,
      qte:v.qte,
      prix:v.prix
    }],
    total:v.total
  }

  factures.push(facture)
  saveData('factures',factures)
}

// ===== DASHBOARD =====
function updateDashboard(){
  let ventes=getData('ventes')
  let today=new Date().toLocaleDateString()

  let vj=ventes.filter(v=>v.date===today)

  totalJour.innerText=vj.reduce((s,v)=>s+v.total,0)
  nbJour.innerText=vj.length
}

// ===== TABLE =====
function afficher(){
  let ventes=getData('ventes')
  table.innerHTML=''

  ventes.forEach(v=>{
    table.innerHTML+=`<tr>
      <td>${v.date}</td>
      <td>${v.article}</td>
      <td>${v.qte}</td>
      <td>${v.prix}</td>
      <td>${v.total}</td>
    </tr>`
  })
}

// ===== PDF =====
function exporterVentesJourPDF(){
  const { jsPDF } = window.jspdf
  const doc=new jsPDF()

  let ventes=getData('ventes')
  let today=new Date().toLocaleDateString()
  let vj=ventes.filter(v=>v.date===today)

  doc.setFontSize(16)
  doc.text("Quincaillerie Khadija",20,20)
  doc.setFontSize(10)
  doc.text("Adresse: Keur Thiem Cité Dabakh",20,30)
  doc.text("Date: "+today,20,40)

  let y=50

  vj.forEach(v=>{
    doc.text(`${v.article} | ${v.qte} x ${v.prix} = ${v.total}`,20,y)
    y+=10
  })

  doc.save("ventes_du_jour.pdf")
}

// INIT
afficher()
updateDashboard()

</script>

</body>
</html>
